name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        dotnet-quality: 'preview'
    - name: Restore (exclude Mobile — requires MAUI workload)
      run: |
        dotnet restore src/TrainingOrganizer.Api/
        dotnet restore src/TrainingOrganizer.Web/
    - name: Build API
      run: dotnet build src/TrainingOrganizer.Api/ --no-restore --configuration Release
    - name: Build Web
      run: dotnet build src/TrainingOrganizer.Web/ --no-restore --configuration Release
    - name: Format check
      run: dotnet format --verify-no-changes --no-restore --exclude src/TrainingOrganizer.Mobile/

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        dotnet-quality: 'preview'
    - name: Run tests
      run: dotnet test --configuration Release --collect:"XPlat Code Coverage" --results-directory ./coverage -- RunConfiguration.TestSessionTimeout=120000
    - name: Upload coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: ./coverage

  docker-build:
    needs: [test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          ghcr.io/${{ github.repository }}/api:latest
    - name: Build and push Web image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.web
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          ghcr.io/${{ github.repository }}/web:latest
