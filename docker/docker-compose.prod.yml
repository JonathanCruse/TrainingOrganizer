services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - api
      - web
      - keycloak
    restart: unless-stopped

  api:
    image: ghcr.io/${GITHUB_REPOSITORY:-trainingorganizer}/api:${TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MongoDB__ConnectionString=mongodb://mongodb:27017/training-organizer
      - Authentication__Schemes__Bearer__Authority=https://auth.${DOMAIN:-localhost}/realms/training-organizer
    depends_on:
      - mongodb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    image: ghcr.io/${GITHUB_REPOSITORY:-trainingorganizer}/web:${TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  mongodb:
    image: mongo:7
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start --hostname=auth.${DOMAIN:-localhost} --proxy-headers=xforwarded --http-enabled=true
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-changeme}
      - KC_DB=dev-file
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M

volumes:
  mongodb_data:
  caddy_data:
  caddy_config:
